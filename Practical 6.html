<!DOCTYPE html>
<html>
<head>
<title>Backlog Exam Registration</title>

<style>
body{
background-color: lightgreen;
font-family: Arial;
}
</style>

</head>
<body>

<h2>Backlog Exam Registration Form</h2>

<form>

<fieldset>
<legend>Student Details</legend>

Name: <input type="text" name="name"><br><br>
Email: <input type="email" name="email"><br><br>
Contact NO: <input type="text" name="contact No:"><br><br>
Roll No: <input type="text" name="Roll No:"><br><br>

Course:
<select name="course">
<option>BCA</option>
<option>BSc</option>
<option>B.Tech</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Exam Details</legend>

Semester:
<input type="radio" name="sem">Sem 1
<input type="radio" name="sem">Sem 2
<input type="radio" name="sem">Sem 3
<br><br>

Backlog Subjects:<br>
<input type="checkbox"> Mathematics<br>
<input type="checkbox"> Programming<br>
<input type="checkbox"> Database<br>

</fieldset>

<br>

<fieldset>
<legend>Payment Method</legend>

<input type="radio" name="payment"> UPI<br>
<input type="radio" name="payment"> Credit/Debit Card<br>
<input type="radio" name="payment"> Net Banking<br>

</fieldset>

<br>

<input type="submit" value="Register">
<input type="reset" value="Clear">

</form>

</body>
</html>
