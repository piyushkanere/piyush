<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML5 APIs Demo</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    #dragBox {
      width: 100px;
      height: 100px;
      background: coral;
      color: white;
      text-align: center;
      line-height: 100px;
      cursor: grab;
    }
    #dropArea {
      width: 200px;
      height: 200px;
      border: 2px dashed #333;
      margin-top: 20px;
      text-align: center;
      line-height: 200px;
    }
  </style>
</head>
<body>

<h2>1. Drag & Drop</h2>
<div id="dragBox" draggable="true">Drag me</div>
<div id="dropArea">Drop here</div>

<h2>2. Geolocation</h2>
<button onclick="getLocation()">Get Location</button>
<p id="location"></p>

<h2>3. Web Storage</h2>
<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="saveData()">Save</button>
<button onclick="loadData()">Load</button>
<p id="storedData"></p>

<script>
  // Drag & Drop
  const dragBox = document.getElementById("dragBox");
  const dropArea = document.getElementById("dropArea");

  dragBox.addEventListener("dragstart", function(e) {
    e.dataTransfer.setData("text", "Dragged!");
  });

  dropArea.addEventListener("dragover", function(e) {
    e.preventDefault();
  });

  dropArea.addEventListener("drop", function(e) {
    e.preventDefault();
    dropArea.innerHTML = "Dropped!";
    dropArea.style.background = "#90ee90";
  });

  // Geolocation
  function getLocation() {
    const output = document.getElementById("location");
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          output.innerHTML = 
            "Latitude: " + position.coords.latitude + 
            "<br>Longitude: " + position.coords.longitude;
        },
        () => {
          output.innerHTML = "Permission denied or unavailable.";
        }
      );
    } else {
      output.innerHTML = "Geolocation not supported.";
    }
  }

  // Web Storage
  function saveData() {
    const name = document.getElementById("nameInput").value;
    localStorage.setItem("username", name);
    alert("Data saved!");
  }

  function loadData() {
    const name = localStorage.getItem("username");
    document.getElementById("storedData").innerHTML = 
      name ? "Stored Name: " + name : "No data found.";
  }
</script>

</body>
</html>
