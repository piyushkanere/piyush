<!DOCTYPE html>
<html>
<head>
    <title>APJ Abdul Kalam Tribute</title>
    <style>
        body {
            font-family: Arial;
            background-color: #eef2f3;
            margin: 0;
        }

        /* Navbar */
        nav {
            background: #222;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        /* Layout */
        .container {
            padding: 20px;
        }

        /* Card */
        .card {
            background: white;
            border: 2px solid #444;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            border: 3px solid #333;
        }

        h1 {
            color: #222;
        }

        p {
            color: #555;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Achievements</a>
    </nav>

    <!-- Content -->
    <div class="container">
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/A._P._J._Abdul_Kalam.jpg" alt="APJ Abdul Kalam">
            <h1>Dr. A.P.J. Abdul Kalam</h1>
            <p>Missile Man of India and 11th President of India.</p>
            <p>He inspired millions with his vision, humility, and dedication to science and education.</p>
        </div>
    </div>

</body>
</html>
