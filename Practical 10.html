<!DOCTYPE html>
<html>
<head>
    <title>HTML Frames & iFrame Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }
        h1 {
            background-color: #333;
            color: white;
            padding: 10px;
        }
        .container {
            display: flex;
            margin: 10px;
        }
        .left, .right {
            width: 50%;
            padding: 10px;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: 2px solid #555;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>HTML iFrame Demonstration</h1>

    <div class="container">
        
        <!-- Google Map Embed -->
        <div class="left">
            <h2>Embedded Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14888.216752498989!2d79.09839529999999!3d21.1104057!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1776150477564!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <!-- External Webpage Embed -->
        <div class="right">
            <h2>External Website</h2>
            <iframe src="https://www.wikipedia.org"></iframe>
        </div>

    </div>

    <!-- Navigation Frame Example -->
    <h2>Navigation Frame Example</h2>

    <iframe name="contentFrame"></iframe>

    <br><br>

    <a href="https://www.google.com" target="contentFrame">Open Google</a> |
    <a href="https://www.github.com" target="contentFrame">Open GitHub</a> |
    <a href="https://www.w3schools.com" target="contentFrame">Open W3Schools</a>

</body>
</html>
